apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecommerce-auth
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/ilham-java-7700/ecommerce-gitops.git'
    targetRevision: HEAD
    path: apps/ecommerce-auth
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
