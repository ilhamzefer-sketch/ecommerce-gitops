apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecommerce-product
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/ilhamzefer-sketch/ecommerce-gitops.git'
    targetRevision: main
    path: apps/ecommerce-product
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
