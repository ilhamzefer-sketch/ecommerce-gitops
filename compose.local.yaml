name: mizan-ecommerce

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  ecommerce-auth:
    image: ghcr.io/ilhamzefer-sketch/ecommerce-auth:latest
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ecommerce?currentSchema=ecommerce_auth
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-password}
      SPRING_FLYWAY_SCHEMAS: ecommerce_auth
      SPRING_FLYWAY_CREATE_SCHEMAS: "true"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-v7I8Jm9N0P1Q2R3S4T5U6V7W8X9Y0Z1A2B3C4D5E6F7G8H9I0J1K2L3M4N5O6P7Q}
      REFRESH_COOKIE_SECURE: "false"
      API_GATEWAY_PUBLIC_URL: http://localhost:8080
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/actuator/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  ecommerce-api-gateway-service:
    image: ghcr.io/ilhamzefer-sketch/ecommerce-api-gateway:latest
    restart: unless-stopped
    environment:
      AUTH_SERVICE_URL: http://ecommerce-auth:8081
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-v7I8Jm9N0P1Q2R3S4T5U6V7W8X9Y0Z1A2B3C4D5E6F7G8H9I0J1K2L3M4N5O6P7Q}
      CORS_ALLOWED_ORIGINS: http://localhost:3001,http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      ecommerce-auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/actuator/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  ecommerce-ui:
    image: ghcr.io/ilhamzefer-sketch/ecommerce-ui:latest
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      ecommerce-api-gateway-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  postgres_data:
