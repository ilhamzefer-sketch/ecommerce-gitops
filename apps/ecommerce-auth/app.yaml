apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-auth-app
  labels:
    app: ecommerce-auth-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecommerce-auth-app
  template:
    metadata:
      labels:
        app: ecommerce-auth-app
    spec:
      imagePullSecrets:
      - name: ghcr-pull-secret
      containers:
      - name: ecommerce-auth-app
        image: ghcr.io/ilhamzefer-sketch/ecommerce-auth:2fa9339d08c86ad2b0b657777edfab4531fa14f3
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "postgres"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres-service:5433/ecommerce?currentSchema=ecommerce_auth"
        - name: SPRING_DATASOURCE_USERNAME
          value: "postgres"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "password"
        - name: SPRING_FLYWAY_SCHEMAS
          value: "ecommerce_auth"
        - name: SPRING_FLYWAY_CREATE_SCHEMAS
          value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-auth-service
spec:
  type: NodePort
  selector:
    app: ecommerce-auth-app
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080
