apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-auth-app
  labels:
    app: ecommerce-auth-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecommerce-auth-app
  template:
    metadata:
      labels:
        app: ecommerce-auth-app
    spec:
      imagePullSecrets:
      - name: ghcr-pull-secret
      containers:
      - name: ecommerce-auth-app
        image: ghcr.io/ilhamzefer-sketch/ecommerce-auth:dea7e7b4b5783ecc19ce6842578d4b2f3174fd45
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "postgres"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres-service:5433/ecommerce?currentSchema=ecommerce_auth"
        - name: SPRING_DATASOURCE_USERNAME
          value: "postgres"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "password"
        - name: SPRING_FLYWAY_SCHEMAS
          value: "ecommerce_auth"
        - name: SPRING_FLYWAY_CREATE_SCHEMAS
          value: "true"
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: ecommerce-jwt-secret
              key: secret-key
        - name: REFRESH_COOKIE_SECURE
          value: "false"
        - name: API_GATEWAY_PUBLIC_URL
          value: "http://localhost:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-auth-service
spec:
  type: ClusterIP
  selector:
    app: ecommerce-auth-app
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
