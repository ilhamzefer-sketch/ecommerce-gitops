apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-shop-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecommerce-shop-app
  template:
    metadata:
      labels:
        app: ecommerce-shop-app
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: ecommerce-shop-app
          image: ghcr.io/ilhamzefer-sketch/ecommerce-shop:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres-service:5433/ecommerce?currentSchema=ecommerce_shop"
            - name: SPRING_DATASOURCE_USERNAME
              value: "postgres"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "password"
            - name: SPRING_FLYWAY_SCHEMAS
              value: "ecommerce_shop"
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ecommerce-jwt-secret
                  key: secret-key
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-shop-service
spec:
  selector:
    app: ecommerce-shop-app
  ports:
    - port: 8082
      targetPort: 8082
