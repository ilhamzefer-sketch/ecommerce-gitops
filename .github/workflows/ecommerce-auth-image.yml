name: Build and deploy ecommerce-auth image

on:
  push:
    branches:
      - main
    paths:
      - "_sources/ecommerce-auth/**"
      - ".github/workflows/ecommerce-auth-image.yml"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/ilhamzefer-sketch/ecommerce-auth
  APP_MANIFEST: apps/ecommerce-auth/app.yaml
  SOURCE_DIR: _sources/ecommerce-auth

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.SOURCE_DIR }}
          file: ${{ env.SOURCE_DIR }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Update GitOps manifest
        shell: bash
        run: |
          set -euo pipefail
          perl -0pi -e "s#image: ghcr\.io/ilhamzefer-sketch/ecommerce-auth:[^\r\n ]+#image: ${IMAGE_NAME}:${GITHUB_SHA}#" "${APP_MANIFEST}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${APP_MANIFEST}"
          if git diff --cached --quiet; then
            echo "Manifest already points to ${IMAGE_NAME}:${GITHUB_SHA}"
            exit 0
          fi
          git commit -m "Deploy ecommerce-auth ${GITHUB_SHA}"
          git push
