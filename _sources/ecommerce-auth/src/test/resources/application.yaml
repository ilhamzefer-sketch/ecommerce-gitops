spring:
  datasource:
    url: jdbc:h2:mem:ecommerce;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    schemas: public
    create-schemas: true

application:
  security:
    jwt:
      secret-key: test-only-jwt-secret-key-that-is-at-least-32-characters
      expiration: 900000
      refresh-token:
        expiration: 604800000
        cookie:
          name: refresh_token
          max-age: 604800
          secure: false
          http-only: true
          same-site: Strict
          path: /api/auth
