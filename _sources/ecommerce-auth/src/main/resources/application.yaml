spring:
  application:
    name: ecommerce-auth

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ecommerce?currentSchema=ecommerce_auth}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    schemas: ${SPRING_FLYWAY_SCHEMAS:ecommerce_auth}
    create-schemas: ${SPRING_FLYWAY_CREATE_SCHEMAS:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

application:
  openapi:
    gateway-url: ${API_GATEWAY_PUBLIC_URL:http://localhost:8080}
  security:
    jwt:
      # Use a 256-bit (32-character) secret key for development. 
      # MUST be provided via ENVIRONMENT VARIABLE in production.
      secret-key: ${JWT_SECRET_KEY:v7I8Jm9N0P1Q2R3S4T5U6V7W8X9Y0Z1A2B3C4D5E6F7G8H9I0J1K2L3M4N5O6P7Q}
      expiration: 900000 # 15 minutes in milliseconds
      refresh-token:
        expiration: 604800000 # 7 days in milliseconds
        cookie:
          name: refresh_token
          max-age: 604800 # 7 days in seconds
          secure: ${REFRESH_COOKIE_SECURE:false}
          http-only: true
          same-site: Strict
          path: /api/auth

springdoc:
  swagger-ui:
    syntax-highlight:
      theme: tomorrow-night

server:
  port: 8081
