name: Build image and update GitOps

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/ilhamzefer-sketch/ecommerce-auth
  GITOPS_REPO: ilhamzefer-sketch/ecommerce-gitops
  GITOPS_PATH: apps/ecommerce-auth/app.yaml

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update Kubernetes image tag
        shell: bash
        run: |
          set -euo pipefail
          cd gitops
          perl -0pi -e "s#image: ghcr\.io/ilhamzefer-sketch/ecommerce-auth:[^\r\n ]+#image: ${IMAGE_NAME}:${GITHUB_SHA}#" "${GITOPS_PATH}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${GITOPS_PATH}"
          if git diff --cached --quiet; then
            echo "GitOps manifest already points at this image."
            exit 0
          fi
          git commit -m "Deploy ecommerce-auth ${GITHUB_SHA}"
          git push
