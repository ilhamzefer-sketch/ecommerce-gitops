spring:
  application:
    name: ecommerce-api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: ecommerce-auth
              uri: ${AUTH_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/auth/**,/api/users/**,/api/admin/**,/v3/api-docs/**,/swagger-ui/**,/swagger-ui.html

server:
  port: ${SERVER_PORT:8080}

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:v7I8Jm9N0P1Q2R3S4T5U6V7W8X9Y0Z1A2B3C4D5E6F7G8H9I0J1K2L3M4N5O6P7Q}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
